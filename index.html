<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hear Me™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">Hear Me™</a>
    <div class="nav-links">
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/support.html">Support</a>
      <a href="/resources.html">Resources</a>
    </div>
  </nav>

  <main class="hero">
    <h1>Hear Me™</h1>
    <p class="subtitle">A space for listening together</p>
    <p class="description">A guided listening exercise for couples, inspired by the Gottman Method.</p>
    <p class="platforms">Available on the App Store and Google Play</p>

    <audio id="bgMusic" loop preload="auto">
      <source src="ambient.mp3" type="audio/mpeg">
    </audio>
  </main>

  <button class="music-toggle" id="musicToggle" aria-label="Toggle music">
    <span id="musicIcon">&#9654;</span>
  </button>

  <script>
    const btn = document.getElementById('musicToggle');
    const audio = document.getElementById('bgMusic');
    const icon = document.getElementById('musicIcon');
    audio.volume = 0.3;

    // Try to autoplay on first user interaction
    function tryAutoplay() {
      audio.play().then(function () {
        icon.textContent = '\u275A\u275A';
      }).catch(function () {});
      document.removeEventListener('click', tryAutoplay);
      document.removeEventListener('touchstart', tryAutoplay);
      document.removeEventListener('scroll', tryAutoplay);
    }
    document.addEventListener('click', tryAutoplay);
    document.addEventListener('touchstart', tryAutoplay);
    document.addEventListener('scroll', tryAutoplay);

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (audio.paused) {
        audio.play();
        icon.textContent = '\u275A\u275A';
      } else {
        audio.pause();
        icon.textContent = '\u25B6';
      }
    });
  </script>

  <footer>
    <p>&copy; 2026 RheumWorld LLC</p>
  </footer>
</body>
</html>
